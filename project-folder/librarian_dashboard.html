<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Librarian Dashboard - Smart Library</title>
<link rel="stylesheet" href="assets/css/global.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="assets/css/librarian_dashboard.css">
  <link rel="icon" type="image/jpeg" href="assets/img/logo.jpg">
</head>

<body>

<!-- Sidebar -->
<aside class="layout-sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">📚</span>
    <span>Librarian</span>
  </div>
  <nav>
    <a href="#" class="nav-item active" onclick="navigate('home')"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="#" class="nav-item" onclick="navigate('manage')"><i class="fas fa-book"></i><span>Add/Manage Books</span></a>
    <a href="#" class="nav-item" onclick="navigate('issue')"><i class="fas fa-hand-holding"></i><span>Issue Books</span></a>
    <a href="#" class="nav-item" onclick="navigate('return')"><i class="fas fa-undo"></i><span>Return Books</span></a>
    <a href="index.html" class="nav-item" style="margin-top:auto;"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
  </nav>
</aside>

<!-- Main Content -->
<main class="layout-main" id="main">

  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()" style="background:none; border:none; color:var(--slate-600); font-size:20px; cursor:pointer;"><i class="fas fa-bars"></i></button>
    
    <div style="display:flex; align-items:center; gap:20px;">
      <div class="notify-wrapper" onclick="toggleNotify()">
        <div class="notify-icon"><i class="fas fa-bell"></i></div>
        <span class="badge-count" id="notifyCount">0</span>
        <div class="notify-dropdown" id="notifyBox">
          <div class="notify-header">Notifications & Messages</div>
          <div id="notifyList"></div>
          <button class="btn-primary btn-sm" style="width:100%; margin-top:10px;" onclick="clearNotify()">Clear All</button>
        </div>
      </div>
      <div>
        <div style="font-weight:700; color:var(--slate-800); font-size:15px;">Head Librarian</div>
        <div style="color:var(--slate-500); font-size:12px;">Admin Access</div>
      </div>
    </div>
  </div>

  <div id="contentArea"></div>

</main>

<!-- Modals -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h3><i class="fas fa-pen"></i> Edit Book Details</h3>
    <input type="hidden" id="editIndex">
    <div class="form-group"><label>Book ID</label><input type="text" class="input" id="eid" disabled></div>
    <div class="form-group"><label>Title</label><input type="text" class="input" id="etitle"></div>
    <div class="form-group"><label>Author</label><input type="text" class="input" id="eauthor"></div>
    <div class="form-group"><label>Edition</label><input type="text" class="input" id="eedition"></div>
    <div class="form-group"><label>Department/Subject</label><input type="text" class="input" id="esubject"></div>
    <div class="form-actions" style="margin-top:20px;">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="assets/js/librarian_dashboard.js"></script>

<script src="assets/js/voice.js"></script>
</body>
</html>
