<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard - Ultimate</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{margin:0;font-family:Arial;display:flex;background:#eef2f7;}
.sidebar{width:220px;height:100vh;background:#2c3e50;color:white;padding:20px;}
.sidebar ul{list-style:none;padding:0;}
.sidebar li{padding:12px;cursor:pointer;}
.sidebar li:hover{background:#34495e;}
.main{flex:1;padding:20px;}
.topbar{display:flex;justify-content:space-between;align-items:center;}
.search{padding:10px;width:300px;border-radius:20px;border:1px solid #ccc;}
.notify{position:relative;margin-right:20px;cursor:pointer;}
.notify i{font-size:22px;}
.badge-count{position:absolute;top:-5px;right:-8px;background:red;color:white;font-size:12px;padding:2px 6px;border-radius:50%;}
.notify-box{position:absolute;right:0;top:30px;width:260px;background:white;padding:15px;border-radius:10px;display:none;box-shadow:0 5px 20px rgba(0,0,0,0.2);max-height:300px;overflow:auto;}
.notify-box.active{display:block;}
.profile{position:relative;cursor:pointer;}
.profile img{width:40px;height:40px;border-radius:50%;}
.profile-card{position:absolute;right:0;top:55px;width:300px;background:white;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.2);padding:15px;display:none;z-index:100;}
.profile-card.active{display:block;}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.3);display:none;z-index:9999;width:300px;}
.books{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:20px;}
.book{background:white;border-radius:15px;padding:10px;box-shadow:0 5px 15px rgba(0,0,0,0.1);cursor:pointer;}
.book:hover{transform:scale(1.05);} 
.book img{width:100%;height:150px;object-fit:cover;border-radius:10px;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:9999;}
.modal-content{background:#fff;padding:20px;border-radius:10px;width:300px;text-align:center;}
.modal button{margin:5px;padding:8px;border:none;border-radius:5px;background:#2c3e50;color:white;cursor:pointer;}
</style>
</head>

<body>

<div class="sidebar">
<h2>Library</h2>
<ul>
<li onclick="openProfile()">Account</li>
<li onclick="openRequest()">Request Books</li>
<li onclick="openHelp()">Help Center</li>
<li onclick="openFeedback()">Feedback</li>
<li onclick="logout()">Logout</li>
</ul>
</div>

<div class="main">

<div class="topbar">
<input type="text" class="search" placeholder="Search" onkeyup="searchBooks()">

<div style="display:flex;align-items:center;">
<div class="notify" onclick="toggleNotify()">
<i class="fas fa-bell"></i>
<span class="badge-count" id="count">0</span>
<div class="notify-box" id="notifyBox"></div>
</div>

<div class="profile" onclick="toggleProfile()">
<img id="topProfileImg" src="https://via.placeholder.com/40">
<div class="profile-card" id="profileDrop">
<h3 id="pname">Student</h3>
<input id="name" placeholder="Name" disabled>
<input id="email" placeholder="Email" disabled>
<button onclick="enableEdit()">Edit</button>
<button onclick="saveProfile()">Save</button>
</div>
</div>
</div>
</div>

<h2>Available Books</h2>
<div class="books" id="bookContainer"></div>

</div>

<!-- POPUPS -->
<div class="popup" id="requestBox"><h3>Request Book</h3><input id="reqBook"><input id="reqAuthor"><button onclick="sendRequest()">Send</button></div>
<div class="popup" id="helpBox"><h3>Help</h3><textarea id="helpMsg"></textarea><button onclick="sendHelp()">Send</button></div>
<div class="popup" id="feedbackBox"><h3>Feedback</h3><textarea id="feedMsg"></textarea><button onclick="sendFeedback()">Send</button></div>

<!-- MODAL -->
<div class="modal" id="bookModal">
<div class="modal-content">
<h3 id="mTitle"></h3>
<p id="mAuthor"></p>
<button onclick="borrowBook()">Borrow</button>
<button onclick="addCart()">Add to Cart</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
let currentBook;

const books=[
{title:"DSA",author:"Mark",id:"1",img:"datastructures.jpeg"},
{title:"Python",author:"Guido",id:"2",img:"python.jpeg"},
{title:"Java",author:"James",id:"3",img:"java.jpeg"},
{title:"C++",author:"Bjarne",id:"4",img:"c++.jpeg"},
{title:"C",author:"Dennis",id:"5",img:"c.jpeg"},
{title:"OS",author:"Silberschatz",id:"6",img:"os.png"},
{title:"DBMS",author:"Korth",id:"7",img:"dbms.jpeg"},
{title:"CN",author:"Tanenbaum",id:"8",img:"cn.jpg"},
{title:"AI",author:"Russell",id:"9",img:"ai.jpg"},
{title:"ML",author:"Tom",id:"10",img:"machinelearning.jpg"},
{title:"JS",author:"Brendan",id:"11",img:"js.jpeg"},
{title:"HTML",author:"W3C",id:"12",img:"html.jpg"},
{title:"CSS",author:"W3C",id:"13",img:"css.jpg"},
{title:"React",author:"Meta",id:"14",img:"react.jpg"},
{title:"Node",author:"Ryan",id:"15",img:"node.jpg"},
{title:"Django",author:"Adrian",id:"16",img:"django.jpg"},
{title:"Flask",author:"Armin",id:"17",img:"flask.jpg"},
{title:"Android",author:"Google",id:"18",img:"android.jpg"},
{title:"Swift",author:"Apple",id:"19",img:"swift.jpg"},
{title:"Kotlin",author:"JetBrains",id:"20",img:"kotlin.jpg"}
];

function displayBooks(list){
bookContainer.innerHTML="";
list.forEach(b=>{
bookContainer.innerHTML+=`<div class="book" onclick='openModal(${JSON.stringify(b)})'>
<img src="assets/img/${b.img}">
<h4>${b.title}</h4>
<p>${b.author}</p>
</div>`;
});
}
displayBooks(books);

function openModal(book){
currentBook=book;
mTitle.innerText=book.title;
mAuthor.innerText=book.author;
bookModal.style.display="flex";
}
function closeModal(){bookModal.style.display="none";}

function borrowBook(){alert("Borrowed " + currentBook.title);} 
function addCart(){alert("Added to cart");}

function searchBooks(){
let v=document.querySelector(".search").value.toLowerCase();
displayBooks(books.filter(b=>b.title.toLowerCase().includes(v)));
}

function toggleProfile(){profileDrop.classList.toggle("active");}
function openProfile(){profileDrop.classList.add("active");}
function enableEdit(){name.disabled=false;email.disabled=false;}
function saveProfile(){
localStorage.setItem("studentProfile",JSON.stringify({name:name.value,email:email.value}));
pname.innerText=name.value;
}

function hideAllPopups(){requestBox.style.display="none";helpBox.style.display="none";feedbackBox.style.display="none";}
function openRequest(){hideAllPopups();requestBox.style.display="block";}
function openHelp(){hideAllPopups();helpBox.style.display="block";}
function openFeedback(){hideAllPopups();feedbackBox.style.display="block";}

function sendRequest(){alert("Request Sent");hideAllPopups();}
function sendHelp(){alert("Help Sent");hideAllPopups();}
function sendFeedback(){alert("Feedback Sent");hideAllPopups();}

function toggleNotify(){notifyBox.classList.toggle("active");}
function loadNotifications(){
let msgs=JSON.parse(localStorage.getItem("studentMsg"))||[];
let alerts=[{text:"📚 Due Tomorrow"},{text:"💰 Fine ₹10"}];
let all=[...msgs,...alerts];
count.innerText=all.length;
notifyBox.innerHTML="";
all.forEach(d=>notifyBox.innerHTML+=`<p>${d.text}</p>`);
}
setInterval(loadNotifications,2000);
loadNotifications();

function logout(){window.location.href="role.html";}
</script>

</body>
</html>
