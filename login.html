<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Library</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: var(--slate-800);
            margin-bottom: 10px;
        }
        .login-header p {
            color: var(--slate-500);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--slate-700);
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-500);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-message {
            color: #e53e3e;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--primary-600);
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2><i class="fas fa-book-open"></i> Smart Library</h2>
                <p>Sign in to your account</p>
                <p style="font-size:14px; color:#475569; margin-top:12px;">Use: admin@vemu.edu / admin123 or librarian@vemu.edu / lib123</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <div id="serverStatus" class="error-message" style="color:#1d4ed8;"></div>
                <div id="errorMessage" class="error-message"></div>
            </form>
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
            errorMessage.textContent = '';
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });
                
                const data = await response.json();
                console.log('Login response:', data);
                
                if (response.ok) {
                    // Store token and user info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Redirect based on role
                    switch (data.user.role) {
                        case 'admin':
                            window.location.href = 'admin_dashboard.html';
                            break;
                        case 'librarian':
                            window.location.href = 'librarian_dashboard.html';
                            break;
                        case 'student':
                            window.location.href = 'student_dashboard.html';
                            break;
                        case 'teacher':
                            window.location.href = 'teacher_dashboard.html';
                            break;
                        default:
                            window.location.href = 'index.html';
                    }
                } else {
                    const errorText = data.msg || data.errors?.[0]?.msg || 'Login failed';
                    errorMessage.textContent = errorText;
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please try again.';
                console.error('Login error:', error);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        });

        async function checkBackend() {
            const serverStatus = document.getElementById('serverStatus');
            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'OPTIONS'
                });
                if (response.ok || response.status === 405) {
                    serverStatus.textContent = 'Backend is running at http://localhost:5000';
                } else {
                    serverStatus.textContent = 'Backend is not reachable. Start server on port 5000.';
                }
            } catch (error) {
                serverStatus.textContent = 'Backend is not reachable. Start server on port 5000.';
                console.error('Backend check failed:', error);
            }
        }

        checkBackend();
    </script>
    <script src="assets/js/voice-assistant.js"></script>
</body>
</html>
